  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Nunito",system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--sage-bg);color:var(--ink);overflow:hidden;}
  .bubble{font-family:"Baloo 2",system-ui,sans-serif;font-weight:800;color:var(--pink);-webkit-text-stroke:3px var(--pink-dark);paint-order:stroke fill;letter-spacing:.02em;text-shadow:0 4px 0 rgba(208,30,119,.20);}

  .app{height:100vh;display:flex;}

  /* Sidebar */
  .sidebar{width:clamp(230px,22vw,320px);flex-shrink:0;background:linear-gradient(180deg,var(--green-mid),var(--green));display:flex;flex-direction:column;padding:clamp(14px,2vh,24px) clamp(12px,1.2vw,18px);gap:clamp(10px,1.6vh,20px);}
  .sb-head{background:rgba(255,255,255,.85);border-radius:18px;padding:14px 16px;text-align:center;}
  .sb-head .hi{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:clamp(20px,2.3vw,30px);color:var(--ink);line-height:1;display:flex;align-items:center;justify-content:center;gap:8px;}
  .sb-head .sub{font-weight:700;color:var(--ink-soft);font-size:clamp(12px,1.3vw,16px);margin-top:6px;}
  .sb-head .hi .smiley{width:1.2em;height:1.2em;background:var(--img-smiley) center/contain no-repeat;display:inline-block;vertical-align:-.18em;}
  .garden{height:clamp(30px,5vh,46px);background:var(--img-flowers) center bottom/contain no-repeat;margin-top:8px;}
  .nav{display:flex;flex-direction:column;gap:clamp(8px,1.2vh,14px);flex:1;}
  .navbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.22);border:none;border-radius:16px;padding:clamp(10px,1.5vh,16px) 16px;color:#eafcef;font-family:"Nunito",sans-serif;font-weight:800;font-size:clamp(13px,1.35vw,18px);cursor:pointer;text-align:left;transition:background .2s,color .2s,transform .12s;-webkit-tap-highlight-color:transparent;}
  .navbtn:hover{background:rgba(255,255,255,.34);}
  .navbtn:active{transform:scale(.98);}
  .navbtn.active{background:var(--green-dark);color:#fff;box-shadow:var(--shadow);}
  .dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.45);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--check);}
  .navbtn.active .dot{background:#fff;}
  .navbtn.done .dot{background:#fff;}
  .mascot{height:clamp(58px,8vh,88px);background:var(--img-squirrel) center/contain no-repeat;}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--sage-bg);}
  .leaves{position:absolute;left:0;top:0;bottom:0;width:clamp(52px,6.5vw,88px);background:var(--img-leaves) center/cover no-repeat;z-index:0;pointer-events:none;}
  .main-head{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:clamp(12px,2vh,22px) clamp(20px,3vw,44px) 0 clamp(70px,8vw,108px);flex-shrink:0;}
  .title{font-size:clamp(40px,6vw,74px);line-height:1;padding:6px 2px;}
  .sqr{width:clamp(60px,7.5vw,100px);height:clamp(60px,7.5vw,100px);background:var(--img-squirrel) center/contain no-repeat;flex-shrink:0;}

  .stage{flex:1;position:relative;z-index:1;padding:clamp(8px,1.6vh,18px) clamp(24px,3.4vw,50px) clamp(8px,1.6vh,18px) clamp(70px,8vw,108px);min-height:0;}
  .screen{position:absolute;inset:clamp(8px,1.6vh,18px) clamp(24px,3.4vw,50px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(12px,2.2vh,26px);opacity:0;visibility:hidden;transform:translateY(8px);transition:opacity .32s ease,transform .32s ease,visibility .32s;}
  .screen.is-active{opacity:1;visibility:visible;transform:none;}
  .screen.fill{justify-content:flex-start;align-items:stretch;gap:8px;}
  .screen[data-screen="stations"]{gap:clamp(8px,1.4vh,16px);}
  .tool-open{align-self:center;font-weight:700;color:var(--green-dark);font-size:clamp(13px,1.4vw,17px);text-decoration:none;padding:4px 10px;}
  .tool-open:hover{text-decoration:underline;}

  .subprompt{font-family:"Baloo 2",sans-serif;font-weight:700;color:var(--blue);font-size:clamp(20px,2.6vw,34px);text-align:center;}
  .frame{font-family:"Baloo 2",sans-serif;font-weight:600;color:var(--green-dark);font-size:clamp(18px,2.4vw,30px);text-align:center;min-height:1.2em;}
  .context{font-weight:800;color:var(--ink-soft);font-size:clamp(14px,1.6vw,21px);text-align:center;opacity:0;transition:opacity .4s;}
  .context.show{opacity:1;}

  /* Tool iframes */
  .tool-frame{flex:1;width:100%;border:none;border-radius:18px;background:#fff;box-shadow:var(--shadow);}

  /* Days of the week — drag & drop */
  .dropzones{display:flex;gap:clamp(10px,1.6vw,24px);justify-content:center;width:100%;flex-wrap:wrap;}
  .zone{flex:1 1 200px;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .zone-label{font-family:"Baloo 2",sans-serif;font-weight:800;color:var(--blue);font-size:clamp(17px,2vw,26px);}
  .zone-drop{width:100%;min-height:clamp(70px,11vh,110px);border-radius:var(--radius);border:3px dashed var(--green-mid);background:var(--panel);display:flex;align-items:center;justify-content:center;padding:8px;transition:border-color .2s,background .2s;}
  .zone-drop.over{border-color:var(--green);background:#EAF9EE;}
  .zone-drop.filled{border-style:solid;border-color:var(--green);background:#EAF9EE;}
  .daysource{display:flex;gap:clamp(6px,1vw,12px);flex-wrap:wrap;justify-content:center;width:100%;}
  .chip{background:var(--card);border:3px solid var(--line);border-radius:16px;padding:clamp(10px,1.8vh,18px) clamp(12px,1.4vw,20px);font-weight:800;font-size:clamp(15px,1.7vw,23px);color:var(--ink);box-shadow:var(--shadow);cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;transition:transform .12s,border-color .2s;}
  .chip:hover{border-color:var(--green-mid);}
  .chip.dragging{position:fixed;z-index:50;cursor:grabbing;box-shadow:0 14px 30px rgba(30,70,35,.28);transition:none;}
  .chip.placed{cursor:default;border-color:var(--green);background:#EAF9EE;}
  .chip.placed::after{content:" \2713";color:var(--green);}
  .confetti{position:fixed;top:26%;width:11px;height:15px;border-radius:2px;z-index:60;pointer-events:none;animation:fall 1.4s ease-in forwards;}
  @keyframes fall{to{transform:translateY(62vh) rotate(400deg);opacity:0}}

  /* Calendar */
  .cal-month{font-family:"Baloo 2",sans-serif;font-weight:800;color:var(--green-dark);font-size:clamp(26px,3.4vw,44px);line-height:1;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:clamp(3px,.6vw,8px);width:min(720px,94%);}
  .cal .dow{text-align:center;font-weight:900;font-size:clamp(11px,1.2vw,16px);color:var(--green-dark);letter-spacing:.05em;padding-bottom:2px;}
  .cal .cell{aspect-ratio:1.4/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;font-weight:800;font-size:clamp(13px,1.5vw,21px);color:var(--ink);background:var(--card);border:2px solid var(--line);position:relative;}
  .cal .cell.empty{background:transparent;border:none;}
  .cal .cell.today{cursor:pointer;box-shadow:var(--shadow);}
  .cal .cell.today:hover{transform:translateY(-2px);}
  .cal .cell.found{background:#FFE8F3;border-color:var(--today);box-shadow:0 0 0 4px rgba(255,93,162,.22);}
  .cal .evt{position:absolute;bottom:5px;font-size:clamp(9px,1vw,13px);line-height:1;}
  .cal-events{display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;max-width:720px;font-weight:700;font-size:clamp(13px,1.4vw,18px);color:var(--ink-soft);}
  .cal-events b{color:var(--green-dark);}
  .cal-theme{font-size:clamp(24px,3.2vw,42px);letter-spacing:.12em;line-height:1;}
  .cal .cell{cursor:pointer;}
  .cal .cell.weekend{background:#EBEFE4;}
  .cal .cell.dayoff{background:#E7E3DB;border-color:#CFC7BA;}
  .cal .cell.dayoff>span:first-child{color:#8A8072;}
  .cal-events .hint{color:var(--ink-soft);font-weight:700;font-style:italic;}
  .cal-editor{position:absolute;inset:0;background:rgba(30,50,25,.34);display:flex;align-items:center;justify-content:center;z-index:20;border-radius:12px;}
  .cal-editor[hidden]{display:none;}
  .ce-panel{background:var(--card);border-radius:22px;padding:clamp(18px,3vh,30px);box-shadow:var(--shadow);width:min(560px,92%);display:flex;flex-direction:column;gap:14px;}
  .ce-title{font-family:"Baloo 2",sans-serif;font-weight:800;color:var(--green-dark);font-size:clamp(22px,2.6vw,32px);text-align:center;}
  .ce-cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .ce-cat{font-weight:800;font-size:clamp(13px,1.4vw,17px);border:2px solid var(--line);background:var(--panel);border-radius:30px;padding:8px 14px;cursor:pointer;font-family:"Nunito",sans-serif;color:var(--ink);}
  .ce-cat.sel{border-color:var(--green);background:#EAF9EE;color:var(--green-dark);}
  .ce-label{font-family:"Nunito",sans-serif;font-weight:700;font-size:clamp(15px,1.7vw,20px);border:2px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--ink);}
  .ce-label:focus{outline:none;border-color:var(--green-mid);}
  .ce-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
  .ce-actions .btn{padding:10px 20px;}

  /* Question of the Day — editable */
  .q-input{width:min(760px,96%);font-family:"Baloo 2",sans-serif;font-weight:700;color:var(--blue);font-size:clamp(22px,2.9vw,38px);text-align:center;background:transparent;border:none;border-bottom:3px dashed transparent;padding:6px 8px;}
  .q-input:focus{outline:none;border-bottom-color:var(--green-mid);}
  .q-cards{display:flex;gap:clamp(12px,1.6vw,22px);flex-wrap:wrap;justify-content:center;width:100%;}
  .qa{position:relative;flex:1 1 170px;max-width:230px;background:var(--card);border:3px solid var(--line);border-radius:var(--radius);padding:12px 12px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;}
  .qa-img{width:100%;aspect-ratio:1/1;border-radius:14px;background:var(--panel) center/cover no-repeat;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed var(--green-mid);color:var(--green-dark);font-weight:800;font-size:clamp(13px,1.4vw,17px);overflow:hidden;text-align:center;}
  .qa-img.has-img{border-style:solid;border-color:var(--line);}
  .qa-label{width:100%;text-align:center;font-weight:900;font-size:clamp(16px,1.9vw,24px);color:var(--ink);background:transparent;border:none;border-bottom:2px solid transparent;padding:4px;}
  .qa-label:focus{outline:none;border-bottom-color:var(--green-mid);}
  .qa-del{position:absolute;top:-10px;right:-10px;width:28px;height:28px;border-radius:50%;border:none;background:var(--check);color:#fff;font-weight:900;font-size:16px;cursor:pointer;box-shadow:var(--shadow);line-height:1;}
  .q-controls{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

  /* Stations / FA assignment board */
  .roster{display:flex;flex-direction:column;gap:clamp(6px,1vh,11px);width:min(940px,98%);max-height:100%;overflow-y:auto;}
  .stu{position:relative;display:flex;align-items:center;gap:clamp(10px,1.4vw,20px);background:var(--card);border:3px solid var(--line);border-radius:16px;padding:clamp(6px,1vh,11px) clamp(12px,1.6vw,20px);box-shadow:var(--shadow);}
  .stu-photo{width:clamp(44px,4.6vw,62px);height:clamp(44px,4.6vw,62px);border-radius:50%;flex-shrink:0;background:var(--panel) center/cover no-repeat;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed var(--green-mid);color:var(--green-dark);font-weight:800;font-size:clamp(18px,2vw,26px);overflow:hidden;}
  .stu-photo.has-img{border-style:solid;border-color:var(--line);}
  .stu-name{width:clamp(84px,10vw,140px);flex-shrink:0;font-weight:900;font-size:clamp(15px,1.7vw,23px);color:var(--ink);background:transparent;border:none;border-bottom:2px solid transparent;padding:4px;}
  .stu-name:focus{outline:none;border-bottom-color:var(--green-mid);}
  .stu-fields{display:flex;gap:clamp(8px,1.2vw,16px);flex:1;flex-wrap:wrap;}
  .stu-fields label{display:flex;flex-direction:column;font-weight:800;font-size:clamp(9px,.95vw,12px);color:var(--green-dark);letter-spacing:.05em;text-transform:uppercase;gap:3px;flex:1;min-width:78px;}
  .stu-fields input{font-weight:800;font-size:clamp(14px,1.6vw,21px);color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:6px 8px;width:100%;font-family:"Nunito",sans-serif;}
  .stu-fields input:focus{border-color:var(--green-mid);outline:none;}
  .stu-del{position:absolute;top:-10px;right:-10px;width:28px;height:28px;border-radius:50%;border:none;background:var(--check);color:#fff;font-weight:900;font-size:16px;cursor:pointer;box-shadow:var(--shadow);line-height:1;}

  .btn{font-family:"Nunito",sans-serif;font-weight:800;font-size:clamp(14px,1.5vw,19px);padding:12px 26px;border-radius:14px;border:3px solid var(--green);background:var(--green);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s;}
  .btn:active{transform:scale(.97);}
  .btn.ghost{background:transparent;color:var(--green-dark);}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="hi">Good Morning! <span class="smiley"></span></div>
      <div class="sub">Let&rsquo;s get started&hellip;</div>
      <div class="garden"></div>
    </div>
    <nav class="nav" id="nav">
      <button class="navbtn" data-screen="checkin"><span>Check In</span><span class="dot"></span></button>
      <button class="navbtn" data-screen="day"><span>Days of the Week</span><span class="dot"></span></button>
      <button class="navbtn" data-screen="cal"><span>Calendar</span><span class="dot"></span></button>
      <button class="navbtn" data-screen="weather"><span>Weather</span><span class="dot"></span></button>
      <button class="navbtn" data-screen="question"><span>Question of the Day</span><span class="dot"></span></button>
      <button class="navbtn" data-screen="stations"><span>Stations</span><span class="dot"></span></button>
    </nav>
    <div class="mascot"></div>
  </aside>

  <main class="main">
    <div class="leaves"></div>
    <div class="main-head">
      <div class="title bubble" id="pageTitle">Check In</div>
      <div class="sqr"></div>
    </div>

    <div class="stage">
      <!-- Check In: Zones board embedded -->
      <section class="screen fill" data-screen="checkin">
        <iframe class="tool-frame" src="https://ryandepew3.github.io/Homeroom-Slides/" title="Zones check-in" loading="lazy"></iframe>
        <a class="tool-open" href="https://ryandepew3.github.io/Homeroom-Slides/" target="_blank" rel="noopener">Not showing? Open the Zones check-in in a new tab ↗</a>
      </section>

      <!-- Days of the Week: drag yesterday / today / tomorrow -->
      <section class="screen" data-screen="day">
        <div class="subprompt">Drag each day to the right box.</div>
        <div class="dropzones">
          <div class="zone"><div class="zone-label">Yesterday</div><div class="zone-drop" data-slot="yesterday"></div></div>
          <div class="zone"><div class="zone-label">Today</div><div class="zone-drop" data-slot="today"></div></div>
          <div class="zone"><div class="zone-label">Tomorrow</div><div class="zone-drop" data-slot="tomorrow"></div></div>
        </div>
        <div class="daysource" id="daySource"></div>
        <div class="frame" id="dayFrame"></div>
      </section>

      <!-- Calendar -->
      <section class="screen" data-screen="cal">
        <div class="cal-month" id="calMonth"></div>
        <div class="cal" id="calGrid"></div>
        <div class="cal-events" id="calEvents"></div>
        <div class="cal-editor" id="calEditor" hidden>
          <div class="ce-panel">
            <div class="ce-title" id="ceTitle"></div>
            <div class="ce-cats" id="ceCats"></div>
            <input class="ce-label" id="ceLabel" placeholder="Name it (e.g., Sihan&rsquo;s birthday)">
            <div class="ce-actions">
              <button class="btn ghost" id="ceRemove">Remove</button>
              <button class="btn ghost" id="ceCancel">Cancel</button>
              <button class="btn" id="ceSave">Save</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Weather embedded -->
      <section class="screen fill" data-screen="weather">
        <iframe class="tool-frame" src="https://ryandepew3.github.io/weather/" title="Today's weather" loading="lazy"></iframe>
        <a class="tool-open" href="https://ryandepew3.github.io/weather/" target="_blank" rel="noopener">Not showing? Open the Weather page in a new tab ↗</a>
      </section>

      <!-- Question of the Day: teacher-editable -->
      <section class="screen" data-screen="question">
        <input class="q-input" id="qText" placeholder="Type today&rsquo;s question&hellip;">
        <div class="q-cards" id="qCards"></div>
        <div class="q-controls">
          <button class="btn ghost" id="qAdd">＋ Add answer</button>
          <button class="btn ghost" id="qClear">Clear all</button>
        </div>
      </section>

      <!-- Stations: FA block assignment board -->
      <section class="screen" data-screen="stations">
        <div class="subprompt">Where do we start today?</div>
        <div class="roster" id="roster"></div>
        <div class="q-controls">
          <button class="btn ghost" id="stnAdd">＋ Add student</button>
          <button class="btn ghost" id="stnClear">Clear assignments</button>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
/* =====================================================================
   Calendar events are added ON the board \u2014 tap any day, choose a
   category, type a name. Saved automatically. The two below are only
   starter examples for the current month; edit or remove them there.
   ===================================================================== */
const SEED_EVENTS = {};
(function(){const m=new Date().getMonth();
  SEED_EVENTS[m+"-12"]={cat:"birthday",label:"Example Birthday"};
  SEED_EVENTS[m+"-21"]={cat:"dayoff",label:"Example Day Off"};
})();

/* Stations / FA assignments are edited on the board itself and saved locally
   \u2014 no config needed here. See the Stations screen. */

const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DOW=["S","M","T","W","T","F","S"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const now=new Date();
const tDow=now.getDay(),tDate=now.getDate(),tMon=now.getMonth(),tYear=now.getFullYear();

/* -------- Days of the week: drag yesterday / today / tomorrow -------- */
const daySource=document.getElementById("daySource"),dayFrame=document.getElementById("dayFrame");
const targets={yesterday:DAYS[(tDow+6)%7],today:DAYS[tDow],tomorrow:DAYS[(tDow+1)%7]};
let placedCount=0;
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function zoneAt(x,y){
  for(const d of document.querySelectorAll(".zone-drop")){
    const r=d.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return d;
  }return null;
}
function makeConfetti(){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  const cols=["#33A457","#FF5DA2","#E3A24B","#2436C8","#5CBB7C"];
  for(let i=0;i<30;i++){const d=document.createElement("div");d.className="confetti";
    d.style.left=(38+Math.random()*24)+"%";d.style.background=cols[i%cols.length];
    d.style.animationDelay=(Math.random()*.3)+"s";document.body.appendChild(d);
    setTimeout(()=>d.remove(),1700);}
}
DAYS.forEach(name=>{
  const chip=document.createElement("div");chip.className="chip";chip.textContent=name;chip.dataset.day=name;
  let ox=0,oy=0,dragging=false;
  const move=(x,y)=>{chip.style.left=(x-ox)+"px";chip.style.top=(y-oy)+"px";};
  const reset=()=>{chip.classList.remove("dragging");chip.style.left="";chip.style.top="";chip.style.width="";};
  chip.addEventListener("pointerdown",e=>{
    if(chip.classList.contains("placed"))return;
    dragging=true;chip.setPointerCapture(e.pointerId);
    const r=chip.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    chip.classList.add("dragging");chip.style.width=r.width+"px";move(e.clientX,e.clientY);
  });
  chip.addEventListener("pointermove",e=>{
    if(!dragging)return;move(e.clientX,e.clientY);
    const z=zoneAt(e.clientX,e.clientY);
    document.querySelectorAll(".zone-drop").forEach(d=>d.classList.toggle("over",d===z));
  });
  chip.addEventListener("pointerup",e=>{
    if(!dragging)return;dragging=false;
    const z=zoneAt(e.clientX,e.clientY);
    document.querySelectorAll(".zone-drop").forEach(d=>d.classList.remove("over"));
    reset();
    if(z&&targets[z.dataset.slot]===name){
      z.appendChild(chip);z.classList.add("filled");chip.classList.add("placed");
      placedCount++;dayFrame.textContent=cap(z.dataset.slot)+" is "+name+".";
      if(placedCount===3){dayFrame.textContent="You did it! \uD83C\uDF89";makeConfetti();}
    }else{
      daySource.appendChild(chip);
      if(z){dayFrame.textContent="Not there \u2014 try again.";}
    }
  });
  chip.addEventListener("pointercancel",()=>{if(dragging){dragging=false;reset();daySource.appendChild(chip);}});
  daySource.appendChild(chip);
});

/* -------- Calendar (themed, tap a day to add events, saved locally) -------- */
const CATS={
  birthday:{emoji:"🎂",name:"Birthday"},
  holiday:{emoji:"🎉",name:"Holiday"},
  dayoff:{emoji:"🚫",name:"Day Off"},
  event:{emoji:"⭐",name:"Event"},
};
const THEMES={
  0:{c:"#3B82C4",e:"❄️ ⛄ 🎉"}, 1:{c:"#E2496B",e:"❤️ 💝"}, 2:{c:"#2FA35A",e:"🍀 🌷 🌱"},
  3:{c:"#E48FB1",e:"🌸 🌧️ 🌱"}, 4:{c:"#3FA94D",e:"🌺 🐝 🌼"}, 5:{c:"#F2A93B",e:"☀️ 🌻"},
  6:{c:"#2438C8",e:"🇺🇸 🎆 ⭐"}, 7:{c:"#E08A2E",e:"🏖️ 🌊 ☀️"}, 8:{c:"#D9762E",e:"🍎 🍂 ✏️"},
  9:{c:"#E4761F",e:"🎃 👻 🕸️"}, 10:{c:"#B5642A",e:"🦃 🍂 🥧"}, 11:{c:"#D0342C",e:"🎄 ❄️ 🎁"},
};
const EV_KEY="morningboard_events_v1";
let events={};
try{const s=localStorage.getItem(EV_KEY);events=s?JSON.parse(s):Object.assign({},SEED_EVENTS);}catch(e){events=Object.assign({},SEED_EVENTS);}
function evSave(){try{localStorage.setItem(EV_KEY,JSON.stringify(events));}catch(e){}}
const theme=THEMES[tMon];
const calMonthEl=document.getElementById("calMonth"),calGrid=document.getElementById("calGrid"),calEventsEl=document.getElementById("calEvents");
const keyFor=d=>tMon+"-"+d;
function renderCal(){
  calMonthEl.textContent=MONTHS[tMon]+" "+tYear;calMonthEl.style.color=theme.c;
  calGrid.innerHTML="";
  DOW.forEach(d=>{const h=document.createElement("div");h.className="dow";h.textContent=d;h.style.color=theme.c;calGrid.appendChild(h);});
  const firstDow=new Date(tYear,tMon,1).getDay(),dim=new Date(tYear,tMon+1,0).getDate();
  for(let i=0;i<firstDow;i++){const e=document.createElement("div");e.className="cell empty";calGrid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const c=document.createElement("div");c.className="cell";
    const ev=events[keyFor(d)];
    const wd=new Date(tYear,tMon,d).getDay();
    if(wd===0||wd===6)c.classList.add("weekend");
    if(ev&&ev.cat==="dayoff")c.classList.add("dayoff");
    if(d===tDate)c.classList.add("today");
    const num=document.createElement("span");num.textContent=d;c.appendChild(num);
    if(ev){const em=document.createElement("span");em.className="evt";em.textContent=(CATS[ev.cat]||CATS.event).emoji;c.appendChild(em);}
    c.addEventListener("click",()=>openEditor(d));
    calGrid.appendChild(c);
  }
  const days=Object.keys(events).filter(k=>k.startsWith(tMon+"-")).map(k=>+k.split("-")[1]).sort((a,b)=>a-b);
  calEventsEl.innerHTML=days.length?days.map(d=>{const ev=events[keyFor(d)],cat=CATS[ev.cat]||CATS.event;
    return "<span>"+cat.emoji+" <b>"+MONTHS[tMon].slice(0,3)+" "+d+"</b> \u2014 "+(ev.label||cat.name)+"</span>";}).join("")
    :"<span class='hint'>Tap any day to add a birthday, holiday, or day off.</span>";
}
const editor=document.getElementById("calEditor"),ceTitle=document.getElementById("ceTitle"),ceCats=document.getElementById("ceCats"),ceLabel=document.getElementById("ceLabel");
let ceDay=null,ceCat="birthday";
function openEditor(d){
  ceDay=d;const ev=events[keyFor(d)];ceCat=ev?ev.cat:"birthday";ceLabel.value=ev?(ev.label||""):"";
  ceTitle.textContent=MONTHS[tMon]+" "+d;
  ceCats.innerHTML="";
  Object.keys(CATS).forEach(k=>{
    const b=document.createElement("button");b.className="ce-cat"+(k===ceCat?" sel":"");b.innerHTML=CATS[k].emoji+" "+CATS[k].name;
    b.addEventListener("click",()=>{ceCat=k;[...ceCats.children].forEach(x=>x.classList.remove("sel"));b.classList.add("sel");});
    ceCats.appendChild(b);
  });
  document.getElementById("ceRemove").style.display=ev?"":"none";
  editor.hidden=false;ceLabel.focus();
}
document.getElementById("ceSave").addEventListener("click",()=>{events[keyFor(ceDay)]={cat:ceCat,label:ceLabel.value.trim()};evSave();editor.hidden=true;renderCal();});
document.getElementById("ceRemove").addEventListener("click",()=>{delete events[keyFor(ceDay)];evSave();editor.hidden=true;renderCal();});
document.getElementById("ceCancel").addEventListener("click",()=>{editor.hidden=true;});
editor.addEventListener("click",e=>{if(e.target===editor)editor.hidden=true;});
renderCal();

/* -------- Question of the Day (editable, saves locally) -------- */
const STORE_KEY="morningboard_qotd_v1";
const qText=document.getElementById("qText"),qCards=document.getElementById("qCards");
let qState={question:"",answers:[{text:"",img:""},{text:"",img:""},{text:"",img:""}]};
function qLoad(){try{const s=localStorage.getItem(STORE_KEY);if(s)qState=JSON.parse(s);}catch(e){}}
function qSave(){try{localStorage.setItem(STORE_KEY,JSON.stringify(qState));}catch(e){}}
function downscale(file,cb){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=520,sc=Math.min(1,max/Math.max(img.width,img.height));
    const cv=document.createElement("canvas");cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL("image/jpeg",0.82));
  };img.src=r.result;};
  r.readAsDataURL(file);
}
function qRender(){
  qText.value=qState.question||"";
  qCards.innerHTML="";
  qState.answers.forEach((a,i)=>{
    const card=document.createElement("div");card.className="qa";
    const imgz=document.createElement("div");imgz.className="qa-img"+(a.img?" has-img":"");
    if(a.img){imgz.style.backgroundImage="url("+a.img+")";imgz.textContent="";}else{imgz.textContent="+ Photo";}
    imgz.addEventListener("click",()=>{
      const inp=document.createElement("input");inp.type="file";inp.accept="image/*";
      inp.onchange=e=>{const f=e.target.files[0];if(f)downscale(f,url=>{qState.answers[i].img=url;qSave();qRender();});};
      inp.click();
    });
    const lbl=document.createElement("input");lbl.className="qa-label";lbl.placeholder="Answer";lbl.value=a.text||"";
    lbl.addEventListener("input",()=>{qState.answers[i].text=lbl.value;qSave();});
    const del=document.createElement("button");del.className="qa-del";del.textContent="\u00D7";del.title="Remove";
    del.addEventListener("click",()=>{qState.answers.splice(i,1);qSave();qRender();});
    card.appendChild(imgz);card.appendChild(lbl);card.appendChild(del);
    qCards.appendChild(card);
  });
}
qText.addEventListener("input",()=>{qState.question=qText.value;qSave();});
document.getElementById("qAdd").addEventListener("click",()=>{if(qState.answers.length<8){qState.answers.push({text:"",img:""});qSave();qRender();}});
document.getElementById("qClear").addEventListener("click",()=>{qState={question:"",answers:[{text:"",img:""},{text:"",img:""}]};qSave();qRender();});
qLoad();qRender();

/* -------- Stations: FA assignment board (editable, saves locally) -------- */
const STN_KEY="morningboard_stations_v1";
const roster=document.getElementById("roster");
let stnState=[
  {name:"Sihan",photo:"",station:"",para:"",task:""},
  {name:"Rowan",photo:"",station:"",para:"",task:""},
  {name:"Shane",photo:"",station:"",para:"",task:""},
  {name:"Lionel",photo:"",station:"",para:"",task:""},
  {name:"Drew",photo:"",station:"",para:"",task:""},
];
function stnLoad(){try{const s=localStorage.getItem(STN_KEY);if(s)stnState=JSON.parse(s);}catch(e){}}
function stnSave(){try{localStorage.setItem(STN_KEY,JSON.stringify(stnState));}catch(e){}}
function stnRender(){
  roster.innerHTML="";
  stnState.forEach((st,i)=>{
    const row=document.createElement("div");row.className="stu";
    const ph=document.createElement("div");ph.className="stu-photo"+(st.photo?" has-img":"");
    if(st.photo){ph.style.backgroundImage="url("+st.photo+")";}else{ph.textContent="+";}
    ph.addEventListener("click",()=>{const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.onchange=e=>{const f=e.target.files[0];if(f)downscale(f,url=>{stnState[i].photo=url;stnSave();stnRender();});};inp.click();});
    const nm=document.createElement("input");nm.className="stu-name";nm.value=st.name||"";nm.placeholder="Name";
    nm.addEventListener("input",()=>{stnState[i].name=nm.value;stnSave();});
    const fields=document.createElement("div");fields.className="stu-fields";
    [["Station","station"],["Staff","para"],["Task","task"]].forEach(([lab,key])=>{
      const l=document.createElement("label");l.textContent=lab;
      const inp=document.createElement("input");inp.value=st[key]||"";
      inp.addEventListener("input",()=>{stnState[i][key]=inp.value;stnSave();});
      l.appendChild(inp);fields.appendChild(l);
    });
    const del=document.createElement("button");del.className="stu-del";del.textContent="\u00D7";del.title="Remove";
    del.addEventListener("click",()=>{stnState.splice(i,1);stnSave();stnRender();});
    row.appendChild(ph);row.appendChild(nm);row.appendChild(fields);row.appendChild(del);
    roster.appendChild(row);
  });
}
document.getElementById("stnAdd").addEventListener("click",()=>{stnState.push({name:"",photo:"",station:"",para:"",task:""});stnSave();stnRender();});
document.getElementById("stnClear").addEventListener("click",()=>{stnState=stnState.map(s=>({name:s.name,photo:s.photo,station:"",para:"",task:""}));stnSave();stnRender();});
stnLoad();stnRender();

/* -------- Navigation + in-order progress -------- */
const navbtns=[...document.querySelectorAll(".navbtn")];
const screens=document.querySelectorAll(".screen");
const order=navbtns.map(b=>b.dataset.screen);
const titles={checkin:"Check In",day:"Days of the Week",cal:"Calendar",weather:"Weather",question:"Question of the Day",stations:"Stations"};
function show(id){
  const idx=order.indexOf(id);
  screens.forEach(s=>s.classList.toggle("is-active",s.dataset.screen===id));
  navbtns.forEach((b,i)=>{
    b.classList.toggle("active",i===idx);
    const done=i<idx;                       // only steps BEFORE the current one are complete
    b.classList.toggle("done",done);
    b.querySelector(".dot").textContent=done?"\u2713":"";
  });
  document.getElementById("pageTitle").textContent=titles[id];
}
navbtns.forEach(b=>b.addEventListener("click",()=>show(b.dataset.screen)));
show("checkin");
</script>
</body>
</html>
